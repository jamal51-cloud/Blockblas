<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast Web Version</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>BLOCK BLAST</h1>
            <div class="score-board">Skor: <span id="score">0</span></div>
        </div>

        <!-- Grid Utama Game (8x8) -->
        <div id="grid" class="grid"></div>

        <!-- Tempat Pilihan Balok (3 Slot) -->
        <div id="block-options" class="options-container"></div>

        <button id="restart-btn" class="hidden">Main Lagi</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
